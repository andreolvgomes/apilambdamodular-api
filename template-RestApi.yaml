AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Globals:
    Function:
        Timeout: 30
        MemorySize: 512
        Architectures: [arm64]
        Tracing: Active
        Runtime: dotnet8

Resources:
    MeuApiGatewayCentral:
        Type: AWS::Serverless::Api
        Properties:
          StageName: Prod

    AdminSeculosApiFunction:
        Type: AWS::Serverless::Function
        Properties:
            Runtime: dotnet8
            CodeUri: ./ApiLambdaModular/
            Handler: ApiLambdaModular
            MemorySize: 1024
            Timeout: 30
            Events:
                ApiEvent:
                    Type: Api
                    Properties:
                        RestApiId: !Ref MeuApiGatewayCentral
                        Path: /produtos/{proxy+}
                        Method: ANY
                ApiRootEvent:
                    Type: Api
                    Properties:
                        RestApiId: !Ref MeuApiGatewayCentral
                        Path: /produtos
                        Method: ANY

    AdminSeculosApiUsuariosFunction:
        Type: AWS::Serverless::Function
        Properties:
            Runtime: dotnet8
            CodeUri: ./ApiLambdaModular/
            Handler: ApiLambdaModular
            MemorySize: 1024
            Timeout: 30
            Events:
                ApiEvent:
                    Type: Api
                    Properties:
                        RestApiId: !Ref MeuApiGatewayCentral
                        Path: /clientes/{proxy+}
                        Method: ANY
                ApiRootEvent:
                    Type: Api
                    Properties:
                        RestApiId: !Ref MeuApiGatewayCentral
                        Path: /clientes
                        Method: ANY

    AdminSeculosApiOutrosFunction:
        Type: AWS::Serverless::Function
        Properties:
            Runtime: dotnet8
            CodeUri: ./ApiLambdaModular/
            Handler: ApiLambdaModular
            MemorySize: 1024
            Timeout: 30
            Events:
                ApiEvent:
                    Type: Api
                    Properties:
                        RestApiId: !Ref MeuApiGatewayCentral
                        Path: /{proxy+}
                        Method: ANY
                ApiRootEvent:
                    Type: Api
                    Properties:
                        RestApiId: !Ref MeuApiGatewayCentral
                        Path: /
                        Method: ANY